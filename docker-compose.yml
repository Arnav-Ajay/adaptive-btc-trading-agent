services:
  market-execution-worker:
    build: .
    container_name: adaptive-btc-market-execution-worker
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.worker_runner"]
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
      - ./data_lake:/app/data_lake
    healthcheck:
      test: ["CMD", "python", "-m", "app.scheduler.worker_healthcheck"]
      interval: 5m
      timeout: 15s
      retries: 3
      start_period: 5m

  dashboard-api:
    build: .
    container_name: adaptive-btc-dashboard-api
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
      - ./data_lake:/app/data_lake
    healthcheck:
      test: ["CMD", "python", "-m", "app.api.healthcheck"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
