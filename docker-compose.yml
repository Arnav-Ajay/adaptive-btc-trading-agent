services:
  trading-agent:
    build: .
    container_name: adaptive-btc-trading-agent
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.trading_runner"]
    env_file:
      - .env
    depends_on:
      market-data-ingestor:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
      - ./data_lake:/app/data_lake
    healthcheck:
      test: ["CMD", "python", "-m", "app.scheduler.trading_healthcheck"]
      interval: 5m
      timeout: 15s
      retries: 3
      start_period: 5m
  dashboard-api:
    build: .
    container_name: adaptive-btc-dashboard-api
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
      - ./data_lake:/app/data_lake
    healthcheck:
      test: ["CMD", "python", "-m", "app.api.healthcheck"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
  market-data-ingestor:
    build: .
    container_name: adaptive-btc-market-data-ingestor
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.collector_runner"]
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
      - ./data_lake:/app/data_lake
    healthcheck:
      test: ["CMD", "python", "-m", "app.scheduler.healthcheck"]
      interval: 5m
      timeout: 15s
      retries: 3
      start_period: 2m
