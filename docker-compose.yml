services:
  trading-agent:
    build: .
    container_name: adaptive-btc-trading-agent
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
      - ./data_lake:/app/data_lake
  market-data-ingestor:
    build: .
    container_name: adaptive-btc-market-data-ingestor
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.collector_runner"]
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
      - ./data_lake:/app/data_lake
    healthcheck:
      test: ["CMD", "python", "-m", "app.scheduler.healthcheck"]
      interval: 5m
      timeout: 15s
      retries: 3
      start_period: 2m
